name: Sync MCP registry snapshot

on:
  schedule:
    # Daily at 06:00 UTC (≈ 23:00 PT the previous day, ≈ 02:00 ET).
    - cron: '0 6 * * *'
  workflow_dispatch: {}  # allow manual triggers from the Actions UI

concurrency:
  group: sync-registry
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest registry
        run: node scripts/sync-registry.mjs

      - name: Healthcheck — refuse to commit a partial fetch
        run: |
          ENTRIES=$(node -e "console.log(require('./data/snapshot.json').servers.length)")
          echo "Snapshot contains $ENTRIES active servers"
          if [ "$ENTRIES" -lt 1000 ]; then
            echo "::error::Suspiciously small snapshot ($ENTRIES). Refusing to commit. Likely a partial fetch or upstream API issue."
            exit 1
          fi
          echo "ENTRIES=$ENTRIES" >> "$GITHUB_ENV"

      - name: Stage main snapshot only
        run: git add data/snapshot.json

      - name: Commit and push if changed
        run: |
          if git diff --staged --quiet; then
            echo "No registry changes since last sync. Exiting cleanly."
            exit 0
          fi
          git config user.name "mcpindex-sync-bot"
          git config user.email "3028386+gautamgb@users.noreply.github.com"
          git commit -m "data: refresh registry snapshot (${ENTRIES} servers)

          Auto-generated by .github/workflows/sync-registry.yml on $(date -u +%Y-%m-%dT%H:%M:%SZ).
          Vercel will redeploy on push, propagating the new servers, scores, and changelog."
          git push
